name: observability

services:
  grafana-lgtm:
    image: 'grafana/otel-lgtm:0.22.1'
    ports:
      - '3000:3000'
      - '4317:4317'
      - '4318:4318'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbit:
    image: rabbitmq:3-management-alpine
    container_name: rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      sh -c "
        rabbitmq-server &
        until rabbitmqctl await_startup; do sleep 2; done;
        rabbitmqctl add_vhost observability;
        rabbitmqctl set_permissions -p observability admin '.*' '.*' '.*';
        wait
      "

  # Instrumented through OpenTelemetry Java Agent (zero-code), with no observability dependencies in the project
  product-service:
    build:
      context: microservices/product
      dockerfile: Dockerfile
    image: product-service:local
    container_name: product-service
    environment:
      JAVA_TOOL_OPTIONS: -javaagent:/opt/otel/opentelemetry-javaagent.jar
      OTEL_SERVICE_NAME: product-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-lgtm:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
    depends_on:
      grafana-lgtm:
        condition: service_healthy

  # OpenTelemetry Starter (published by the OTel project) for Spring Boot auto-instrumentation
  payment-service:
    build:
      context: microservices/payment
      dockerfile: Dockerfile
    image: payment-service:local
    container_name: payment-service
    environment:
      PAYMENT_SUCCESS_RATE: 70
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-lgtm:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    depends_on:
      grafana-lgtm:
        condition: service_healthy

  # Observability through Micrometer Tracing with the OTel bridge (zero-agent, zero-starter)
  notification-service:
    build:
      context: microservices/notification
      dockerfile: Dockerfile
    image: notification-service:local
    container_name: notification-service
    environment:
      SPRING_RABBITMQ_HOST: rabbit
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://grafana-lgtm:4318/v1/traces
      MANAGEMENT_OTLP_LOGGING_ENDPOINT: http://grafana-lgtm:4318/v1/logs
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://grafana-lgtm:4318/v1/metrics
    depends_on:
      rabbit:
        condition: service_healthy
      grafana-lgtm:
        condition: service_healthy

  # Native Spring Boot 4.x starter for OpenTelemetry
  order-service:
    build:
      context: microservices/order
      dockerfile: Dockerfile
    image: order-service:local
    container_name: order-service
    ports:
      - "8080:8080"
    environment:
      SPRING_RABBITMQ_HOST: rabbit
      OTEL_METRICS_EXPORTER_ENDPOINT: http://grafana-lgtm:4318/v1/metrics
      OTEL_TRACING_EXPORTER_ENDPOINT: http://grafana-lgtm:4318/v1/traces
      OTEL_LOGGING_EXPORTER_ENDPOINT: http://grafana-lgtm:4318/v1/logs
      MICROSERVICE_PRODUCT_URL: http://product-service:8081
      MICROSERVICE_PAYMENT_URL: http://payment-service:8082
    depends_on:
      rabbit:
        condition: service_healthy
      grafana-lgtm:
        condition: service_healthy
      payment-service:
        condition: service_started
      product-service:
        condition: service_started
      notification-service:
        condition: service_started
