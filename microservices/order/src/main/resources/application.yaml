server.port: 8080

spring:
  application.name: order-service
  threads.virtual.enabled: true

## H2
  datasource:
    url: jdbc:h2:mem:order;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2.console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate.ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  sql.init.mode: always
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin
    virtual-host: observability
    # Habilita propagação de trace (traceparent) nos headers das mensagens publicadas no RabbitMQ
    template.observation-enabled: true

management:
  tracing.sampling.probability: 1.0
  otlp:
    metrics.export:
      url: ${OTEL_METRICS_EXPORTER_ENDPOINT:http://localhost:4318/v1/metrics}
      step: 5s
  opentelemetry:
    tracing.export.otlp.endpoint: ${OTEL_TRACING_EXPORTER_ENDPOINT:http://localhost:4318/v1/traces}
    logging.export.otlp.endpoint: ${OTEL_LOGGING_EXPORTER_ENDPOINT:http://localhost:4318/v1/logs}

microservices:
  product.url: ${MICROSERVICE_PRODUCT_URL:http://localhost:8081}
  payment.url: ${MICROSERVICE_PAYMENT_URL:http://localhost:8082}
