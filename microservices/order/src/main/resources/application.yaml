server.port: 8080

spring:
  application.name: order
  threads.virtual.enabled: true

## H2
  datasource:
    url: jdbc:h2:mem:order;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2.console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate.ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true  # ← garante que o Hibernate cria as tabelas antes do data.sql
  sql.init.mode: always

#  datasource:
#    url: jdbc:postgresql://localhost:5432/postgres
#    username: postgres
#    password: 123456
#  jpa:
#    hibernate.ddl-auto: create-drop
#    show-sql: true

management:
  tracing.sampling.probability: 1.0
  otlp.metrics.export:
      url: http://localhost:4318/v1/metrics
      step: 5s
  opentelemetry:
    tracing.export.otlp.endpoint: http://localhost:4318/v1/traces
    logging.export.otlp.endpoint: http://localhost:4318/v1/logs
