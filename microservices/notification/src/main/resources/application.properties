server.port=8083

spring.application.name=notification-service
spring.threads.virtual.enabled=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin
spring.rabbitmq.virtual-host=observability

# Number of messages delivered concurrently to each consumer before waiting for ACK
# (prevents one consumer from accumulating too many messages while others stay idle)
spring.rabbitmq.listener.simple.prefetch=5

# Initial number of consumers (threads) created to process messages
spring.rabbitmq.listener.simple.concurrency=3

# Maximum number of consumers that can be created dynamically under high load
spring.rabbitmq.listener.simple.max-concurrency=10

# Enables the consumer retry mechanism
spring.rabbitmq.listener.simple.retry.enabled=true

# Tries at most 3 times (1 original attempt + 2 retries)
spring.rabbitmq.listener.simple.retry.max-attempts=3

# Waits 1s before the first retry
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms

# Waits at most 10s between retries (limits the backoff)
spring.rabbitmq.listener.simple.retry.max-interval=10000ms

# Interval multiplier on each attempt (default: 1.0 = no growth)
spring.rabbitmq.listener.simple.retry.multiplier=2.0

# Enables trace extraction (traceparent) from headers of messages received from RabbitMQ,
# continuing the distributed trace started by the publisher. If the header is not present,
# a new trace is started automatically.
spring.rabbitmq.listener.simple.observation-enabled=true

# Defines the trace sampling rate: 1.0 = 100% of requests (recommended only in development)
management.tracing.sampling.probability=1.0

# OTLP endpoint for trace export (for example, Grafana Tempo)
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# OTLP endpoint for log export through OpenTelemetryAppender (for example, Grafana Loki)
management.otlp.logging.endpoint=http://localhost:4318/v1/logs

# OTLP endpoint for metrics export (for example, Grafana Mimir or Prometheus)
management.otlp.metrics.export.url=http://localhost:4318/v1/metrics

# Metrics export interval to the backend
management.otlp.metrics.export.step=10s
