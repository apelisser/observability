server.port=8083

spring.application.name=notification-service
spring.threads.virtual.enabled=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin
spring.rabbitmq.virtual-host=observability

# Quantidade de mensagens entregues simultaneamente a cada consumer antes de aguardar ACK
# (evita que um consumer acumule muitas mensagens enquanto outros ficam ociosos)
spring.rabbitmq.listener.simple.prefetch=5

# Número inicial de consumers (threads) criados para processar mensagens
spring.rabbitmq.listener.simple.concurrency=3

# Limite máximo de consumers que podem ser criados dinamicamente sob alta carga
spring.rabbitmq.listener.simple.max-concurrency=10

# Habilita o mecanismo de retry no consumer
spring.rabbitmq.listener.simple.retry.enabled=true

# Tenta no máximo 3 vezes (1 tentativa original + 2 retries)
spring.rabbitmq.listener.simple.retry.max-attempts=3

# Aguarda 1s antes do primeiro retry
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms

# Aguarda no máximo 10s entre retries (limita o backoff)
spring.rabbitmq.listener.simple.retry.max-interval=10000ms

# Multiplicador do intervalo a cada tentativa (padrão: 1.0 = sem crescimento)
spring.rabbitmq.listener.simple.retry.multiplier=2.0

# Habilita a extração do trace (traceparent) dos headers das mensagens recebidas do RabbitMQ,
# continuando o trace distribuído iniciado pelo publisher. Caso o header não esteja presente,
# um novo trace é iniciado automaticamente.
spring.rabbitmq.listener.simple.observation-enabled=true

# Define a taxa de amostragem de traces: 1.0 = 100% das requisições (recomendado apenas em desenvolvimento)
management.tracing.sampling.probability=1.0

# Endpoint OTLP para exportação de traces (ex: Grafana Tempo)
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# Endpoint OTLP para exportação de logs via OpenTelemetryAppender (ex: Grafana Loki)
management.otlp.logging.endpoint=http://localhost:4318/v1/logs

# Endpoint OTLP para exportação de métricas (ex: Grafana Mimir ou Prometheus)
management.otlp.metrics.export.url=http://localhost:4318/v1/metrics

# Intervalo de envio das métricas ao backend
management.otlp.metrics.export.step=10s